name: Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      platforms:
        description: 'Platforms to build (comma-separated: linux,darwin,win32 or "all")'
        required: false
        default: 'all'

jobs:
  validate-tag:
    name: Validate tag format
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Reject malformed tags
        env:
          TAG: ${{ github.ref_name }}
        run: |
          chmod +x .github/scripts/winget/validate-tag.sh
          .github/scripts/winget/validate-tag.sh "$TAG"

  build-bridge-app:
    name: Build Bridge App (${{ matrix.platform }}${{ matrix.arch && format('-{0}', matrix.arch) || '' }})
    needs: [validate-tag]
    if: |
      always() &&
      (needs.validate-tag.result == 'success' || needs.validate-tag.result == 'skipped')
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux
          - os: macos-latest
            platform: darwin
            arch: arm64
          - os: macos-15-intel
            platform: darwin
            arch: x64
          - os: windows-latest
            platform: win32
    runs-on: ${{ matrix.os }}
    steps:
      - name: Check platform filter
        id: filter
        shell: bash
        run: |
          PLATFORMS="${{ inputs.platforms || 'all' }}"
          if [[ "$PLATFORMS" == "all" || "$PLATFORMS" == *"${{ matrix.platform }}"* ]]; then
            echo "skip=false" >> "$GITHUB_OUTPUT"
          else
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "Skipping ${{ matrix.platform }} (not in: $PLATFORMS)"
          fi

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        if: steps.filter.outputs.skip != 'true'

      - name: Set up Node.js
        if: steps.filter.outputs.skip != 'true'
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "22"

      - name: Install AppImage dependencies
        if: steps.filter.outputs.skip != 'true' && matrix.platform == 'linux'
        run: sudo apt-get update && sudo apt-get install -y libfuse2

      - name: Install bridge-app dependencies
        if: steps.filter.outputs.skip != 'true'
        working-directory: bridge-app
        run: npm ci

      - name: Set version from tag
        if: steps.filter.outputs.skip != 'true'
        shell: bash
        env:
          REF: ${{ github.ref }}
          REF_NAME: ${{ github.ref_name }}
          SHA: ${{ github.sha }}
        run: |
          chmod +x .github/scripts/winget/tag-to-semver.sh
          if [[ "$REF" == refs/tags/v* ]]; then
            SEMVER="$(.github/scripts/winget/tag-to-semver.sh "$REF_NAME")"
            echo "Tag $REF_NAME → semver $SEMVER"
          else
            SEMVER="0.0.0-dev.${SHA:0:7}"
            echo "No tag — using dev version $SEMVER"
          fi
          echo "SEMVER=$SEMVER" >> "$GITHUB_ENV"
          (cd bridge-app && npm version "$SEMVER" --no-git-tag-version --allow-same-version)

      - name: Build installers
        if: steps.filter.outputs.skip != 'true'
        working-directory: bridge-app
        run: npm run make ${{ matrix.arch && format('-- --arch {0}', matrix.arch) || '' }}

      - name: Verify silent install (Windows)
        if: steps.filter.outputs.skip != 'true' && matrix.platform == 'win32'
        shell: pwsh
        run: |
          $exe = Get-ChildItem -Path "bridge-app/out/make/squirrel.windows/x64/WrzDJ-Bridge.exe" -ErrorAction Stop
          Write-Host "Installer found: $($exe.FullName) ($([math]::Round($exe.Length/1MB, 1)) MB)"

          $proc = Start-Process -FilePath $exe.FullName -ArgumentList "--silent" -Wait -PassThru -NoNewWindow
          if ($proc.ExitCode -ne 0) {
            Write-Error "Silent install failed with exit code $($proc.ExitCode)"
            exit 1
          }
          Write-Host "Silent install completed (exit code 0)"

      - name: Verify ARP DisplayVersion matches semver (Windows)
        if: steps.filter.outputs.skip != 'true' && matrix.platform == 'win32' && startsWith(github.ref, 'refs/tags/v')
        shell: pwsh
        run: ./.github/scripts/winget/verify-arp-version.ps1 -Expected $env:SEMVER

      - name: Verify silent uninstall (Windows)
        if: steps.filter.outputs.skip != 'true' && matrix.platform == 'win32'
        shell: pwsh
        run: ./.github/scripts/winget/verify-uninstall.ps1

      - name: Upload build artifacts
        if: steps.filter.outputs.skip != 'true'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: bridge-app-${{ matrix.platform }}${{ matrix.arch && format('-{0}', matrix.arch) || '' }}
          path: bridge-app/out/make/**/*
          if-no-files-found: warn

  bundle-deploy-scripts:
    name: Bundle deploy scripts
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Create deploy bundle
        run: |
          tar -czf wrzdj-deploy-scripts.tar.gz \
            deploy/docker-compose.yml \
            deploy/docker-compose.ghcr.yml \
            deploy/deploy.sh \
            deploy/deploy-ghcr.sh \
            deploy/DEPLOYMENT.md \
            deploy/.env.example \
            deploy/nginx/ \
            docker-compose.yml

      - name: Upload deploy bundle
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: deploy-scripts
          path: wrzdj-deploy-scripts.tar.gz

  create-release:
    name: Create GitHub Release
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [build-bridge-app, bundle-deploy-scripts]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Download all artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: artifacts

      - name: Generate release notes
        run: |
          # Get commits since last release tag (excluding current)
          LAST_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
          if [ -n "$LAST_TAG" ]; then
            COMMITS=$(git log "${LAST_TAG}..HEAD" --pretty=format:"- %s" --no-merges | head -30)
          else
            COMMITS=$(git log --pretty=format:"- %s" --no-merges -20)
          fi

          cat > release_notes.md << EOF
          ## What's Changed

          ### Commits
          ${COMMITS}

          ### Downloads

          | Platform | Artifact |
          |----------|----------|
          | Windows | \`bridge-app-win32\` |
          | macOS (Apple Silicon) | \`bridge-app-darwin-arm64\` |
          | macOS (Intel) | \`bridge-app-darwin-x64\` |
          | Linux | \`bridge-app-linux\` |
          | Deploy Scripts | \`wrzdj-deploy-scripts.tar.gz\` |
          EOF

      - name: Create release
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v2
        with:
          tag_name: ${{ github.ref_name }}
          name: "WrzDJ ${{ github.ref_name }}"
          body_path: release_notes.md
          draft: false
          prerelease: false
          files: |
            artifacts/**/*

  update-winget:
    name: Update winget manifest
    if: |
      startsWith(github.ref, 'refs/tags/v') &&
      (github.event_name != 'workflow_dispatch' ||
       inputs.platforms == null ||
       inputs.platforms == '' ||
       inputs.platforms == 'all' ||
       contains(inputs.platforms, 'win32'))
    needs: [create-release]
    runs-on: windows-latest
    env:
      REF_NAME: ${{ github.ref_name }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Compute semver from tag
        shell: pwsh
        run: |
          $version = & ./.github/scripts/winget/tag-to-semver.ps1 -Tag $env:REF_NAME
          Write-Host "Tag $env:REF_NAME -> semver $version"
          "SEMVER=$version" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Wait for release asset to be reachable
        shell: pwsh
        env:
          ASSET_URL: https://github.com/thewrz/WrzDJ/releases/download/${{ github.ref_name }}/WrzDJ-Bridge.exe
        run: ./.github/scripts/winget/wait-for-asset.ps1 -Url $env:ASSET_URL

      - name: Sync fork with upstream microsoft/winget-pkgs
        # wingetcreate fails with "forked repository could not be synced with the
        # upstream commits" when our fork has drifted. Sync first so submit succeeds.
        env:
          GH_TOKEN: ${{ secrets.WINGET_PAT }}
        run: gh repo sync thewrz/winget-pkgs

      - name: Update winget package
        shell: pwsh
        env:
          ASSET_URL: https://github.com/thewrz/WrzDJ/releases/download/${{ github.ref_name }}/WrzDJ-Bridge.exe
          WINGET_PAT: ${{ secrets.WINGET_PAT }}
        run: |
          Invoke-WebRequest -Uri https://aka.ms/wingetcreate/latest -OutFile wingetcreate.exe
          .\wingetcreate.exe update WrzDJ.WrzDJ-Bridge `
            --urls "$env:ASSET_URL|x64" `
            --version $env:SEMVER `
            --token $env:WINGET_PAT `
            --submit
